name: K6 Performance Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: k6-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup k6
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Mostrar versão do k6
        run: k6 version

  k6_get:
    name: k6 (teste-get.js)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Instalar k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - run: mkdir -p results
      - name: Rodar teste-get.js
        run: |
          k6 run --summary-export results/teste-get-summary.json tests/teste-get.js | tee results/teste-get.log
      - uses: actions/upload-artifact@v4
        with:
          name: k6-teste-get
          path: results/

  k6_post:
    name: k6 (teste-post.js)
    runs-on: ubuntu-latest
    needs: k6_get
    steps:
      - uses: actions/checkout@v4
      - name: Instalar k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - run: mkdir -p results
      - name: Rodar teste-post.js
        run: |
          k6 run --summary-export results/teste-post-summary.json tests/teste-post.js | tee results/teste-post.log
      - uses: actions/upload-artifact@v4
        with:
          name: k6-teste-post
          path: results/

  k6_put:
    name: k6 (teste-put.js)
    runs-on: ubuntu-latest
    needs: k6_post
    steps:
      - uses: actions/checkout@v4
      - name: Instalar k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
