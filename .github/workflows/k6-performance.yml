name: K6 Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: k6-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        script:
          - teste-get.js
          - teste-post.js
          - teste-put.js
          - teste-delete.js

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Criar pasta de resultados
        run: mkdir -p results

      - name: Rodar ${{ matrix.script }}
        run: |
          base_name="${{ matrix.script }}"
          base_name="${base_name%.js}"

          k6 run \
            --summary-export "results/${base_name}-summary.json" \
            "${{ matrix.script }}" \
            | tee "results/${base_name}.log"

      - name: Publicar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-${{ matrix.script }}
          path: results/